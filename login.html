<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TheBidCraft — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --orange: #FF5C1A;
      --orange-light: #FF7A3D;
      --orange-dim: rgba(255,92,26,0.12);
      --dark: #111210;
      --dark-2: #1A1B18;
      --dark-3: #242520;
      --mid: #35362F;
      --steel: #6B7066;
      --mist: #A8ADA0;
      --white: #FAFAF8;
      --green: #4CAF7D;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'Plus Jakarta Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: var(--dark);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow: hidden;
    }

    /* Background glow */
    body::after {
      content: '';
      position: fixed;
      top: -100px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse, rgba(255,92,26,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      background: var(--dark-2);
      border: 1px solid var(--mid);
      border-radius: 20px;
      padding: 44px 40px;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
      text-decoration: none;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: var(--orange);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
    }
    .logo-text {
      font-family: var(--font-display);
      font-size: 22px;
      letter-spacing: 1px;
      color: var(--white);
    }

    /* Tab switcher */
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: var(--dark-3);
      border: 1px solid var(--mid);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab {
      padding: 9px;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 600;
      font-family: var(--font-body);
      border: none;
      background: none;
      color: var(--steel);
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .tab.active {
      background: var(--dark-2);
      color: var(--white);
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    /* Form */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--steel);
      margin-bottom: 7px;
    }
    .form-input {
      width: 100%;
      background: var(--dark-3);
      border: 1px solid var(--mid);
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 14px;
      color: var(--white);
      font-family: var(--font-body);
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--orange); }
    .form-input::placeholder { color: var(--steel); }

    /* Submit button */
    .submit-btn {
      width: 100%;
      background: var(--orange);
      border: none;
      border-radius: 10px;
      padding: 14px;
      color: white;
      font-size: 15px;
      font-weight: 700;
      font-family: var(--font-body);
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .submit-btn:hover:not(:disabled) {
      background: var(--orange-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(255,92,26,0.3);
    }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .spin {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }
    .submit-btn.loading .spin { display: block; }
    .submit-btn.loading .btn-txt { opacity: 0.7; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--steel);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--mid);
    }

    /* Messages */
    .msg {
      padding: 11px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
      line-height: 1.5;
    }
    .msg.error {
      background: rgba(255,59,48,0.1);
      border: 1px solid rgba(255,59,48,0.3);
      color: #ff6b6b;
    }
    .msg.success {
      background: rgba(76,175,125,0.1);
      border: 1px solid rgba(76,175,125,0.3);
      color: var(--green);
    }
    .msg.on { display: block; }

    /* Footer note */
    .footer-note {
      text-align: center;
      font-size: 12px;
      color: var(--steel);
      margin-top: 20px;
      line-height: 1.6;
    }
    .footer-note a { color: var(--orange); text-decoration: none; }
    .footer-note a:hover { text-decoration: underline; }

    /* Free trial badge */
    .trial-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--orange-dim);
      border: 1px solid rgba(255,92,26,0.25);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--mist);
      margin-bottom: 24px;
    }
    .trial-badge strong { color: var(--orange); }

    /* Forgot password */
    .forgot-link {
      text-align: right;
      margin-top: -8px;
      margin-bottom: 16px;
    }
    .forgot-link a {
      font-size: 12px;
      color: var(--steel);
      text-decoration: none;
      transition: color 0.2s;
    }
    .forgot-link a:hover { color: var(--orange); }

    /* Reset form (hidden by default) */
    .reset-form { display: none; }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--steel);
      cursor: pointer;
      margin-bottom: 20px;
      transition: color 0.2s;
      background: none;
      border: none;
      font-family: var(--font-body);
      padding: 0;
    }
    .back-link:hover { color: var(--white); }
  </style><!-- Google tag (gtag.js) -->

<body>

<div class="card">

  <!-- Logo -->
  <a href="/" class="logo">
    <div class="logo-icon">🔨</div>
    <span class="logo-text">TheBidCraft</span>
  </a>

  <!-- Free trial badge -->
  <div class="trial-badge">
    🎉 <span><strong>5 free proposals</strong> — no credit card needed to start</span>
  </div>

  <!-- Messages -->
  <div class="msg error" id="errMsg"></div>
  <div class="msg success" id="sucMsg"></div>

  <!-- ── MAIN AUTH FORM ── -->
  <div id="authForm">

    <!-- Tab switcher -->
    <div class="tabs">
      <button class="tab active" id="tabLogin" onclick="switchTab('login')">Log In</button>
      <button class="tab" id="tabSignup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Email field -->
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" class="form-input" id="emailInput" placeholder="you@yourcompany.com" />
    </div>

    <!-- Password field -->
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="passInput" placeholder="••••••••" />
    </div>

    <!-- Forgot password (login only) -->
    <div class="forgot-link" id="forgotLink">
      <a href="#" onclick="showReset(event)">Forgot password?</a>
    </div>

    <!-- Submit -->
    <button class="submit-btn" id="submitBtn" onclick="handleAuth()">
      <div class="spin"></div>
      <span class="btn-txt" id="submitTxt">Log In →</span>
    </button>

    <div class="footer-note" id="footerNote">
      Don't have an account? <a href="#" onclick="switchTab('signup'); return false;">Sign up free</a>
    </div>

  </div>

  <!-- ── PASSWORD RESET FORM ── -->
  <div class="reset-form" id="resetForm">
    <button class="back-link" onclick="hideReset()">← Back to login</button>
    <div class="form-group">
      <label class="form-label">Enter your email to reset password</label>
      <input type="email" class="form-input" id="resetEmail" placeholder="you@yourcompany.com" />
    </div>
    <button class="submit-btn" id="resetBtn" onclick="handleReset()">
      <div class="spin"></div>
      <span class="btn-txt">Send Reset Link →</span>
    </button>
  </div>

</div>

<script>
// ══════════════════════════════════════════════════
//  SUPABASE CONFIG
//  Replace these two values with your own from
//  Supabase → Settings → API
// ══════════════════════════════════════════════════
const SUPABASE_URL  = 'https://xerkpkvptkrbfqpwyvox.supabase.co';
const SUPABASE_ANON = 'sb_publishable_ELnTItiALr7SmKjd2L_29Q_kl8BFikx';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

// ── Auto-redirect if already logged in ──
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) window.location.href = '/app.html';
})();

// ── Tab state ──
let mode = 'login';

function switchTab(m) {
  mode = m;
  document.getElementById('tabLogin').classList.toggle('active', m === 'login');
  document.getElementById('tabSignup').classList.toggle('active', m === 'signup');
  document.getElementById('submitTxt').textContent = m === 'login' ? 'Log In →' : 'Create Free Account →';
  document.getElementById('forgotLink').style.display = m === 'login' ? 'block' : 'none';
  document.getElementById('footerNote').innerHTML = m === 'login'
    ? 'Don\'t have an account? <a href="#" onclick="switchTab(\'signup\'); return false;">Sign up free</a>'
    : 'Already have an account? <a href="#" onclick="switchTab(\'login\'); return false;">Log in</a>';
  clearMsgs();
}

// ── Handle login or signup ──
async function handleAuth() {
  const email = document.getElementById('emailInput').value.trim();
  const pass  = document.getElementById('passInput').value;

  if (!email || !pass) {
    showErr('Please enter your email and password.');
    return;
  }

  if (pass.length < 6) {
    showErr('Password must be at least 6 characters.');
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.classList.add('loading'); btn.disabled = true;
  clearMsgs();

  if (mode === 'login') {
    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) {
      showErr(error.message === 'Invalid login credentials'
        ? 'Wrong email or password. Please try again.'
        : error.message);
    } else {
      showSuc('Logging you in...');
      setTimeout(() => window.location.href = '/app.html', 800);
    }

  } else {
    const { error } = await sb.auth.signUp({
      email,
      password: pass,
      options: { emailRedirectTo: 'https://www.thebidcraft.com/app.html' }
    });
    if (error) {
      showErr(error.message);
    } else {
      showSuc('✅ Account created! Check your email to confirm your account, then come back and log in.');
      document.getElementById('emailInput').value = '';
      document.getElementById('passInput').value = '';
    }
  }

  btn.classList.remove('loading'); btn.disabled = false;
}

// ── Password reset ──
function showReset(e) {
  e.preventDefault();
  document.getElementById('authForm').style.display = 'none';
  document.getElementById('resetForm').style.display = 'block';
  clearMsgs();
}

function hideReset() {
  document.getElementById('authForm').style.display = 'block';
  document.getElementById('resetForm').style.display = 'none';
  clearMsgs();
}

async function handleReset() {
  const email = document.getElementById('resetEmail').value.trim();
  if (!email) { showErr('Please enter your email address.'); return; }

  const btn = document.getElementById('resetBtn');
  btn.classList.add('loading'); btn.disabled = true;

  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: 'https://www.thebidcraft.com/login.html'
  });

  if (error) {
    showErr(error.message);
  } else {
    showSuc('✅ Password reset email sent. Check your inbox.');
  }

  btn.classList.remove('loading'); btn.disabled = false;
}

// ── Allow Enter key to submit ──
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.getElementById('resetForm').style.display === 'block') {
      handleReset();
    } else {
      handleAuth();
    }
  }
});

// ── Message helpers ──
function showErr(msg) {
  const el = document.getElementById('errMsg');
  el.textContent = '⚠️ ' + msg;
  el.classList.add('on');
}
function showSuc(msg) {
  const el = document.getElementById('sucMsg');
  el.textContent = msg;
  el.classList.add('on');
}
function clearMsgs() {
  document.getElementById('errMsg').classList.remove('on');
  document.getElementById('sucMsg').classList.remove('on');
}
</script>
